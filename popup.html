<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; width: 240px; }
    h2 { font-size: 14px; margin-bottom: 8px; }
    label { font-size: 11px; display: block; margin-top: 8px; margin-bottom: 3px; }
    input { width: 100%; padding: 4px; box-sizing: border-box; font-size: 11px; }
    button { margin-top: 10px; width: 100%; padding: 7px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    #acceptBtn { background: #0a66c2; color: white; }
    #ignoreBtn { background: #cc1016; color: white; }
    #status { margin-top: 8px; font-size: 11px; color: green; }
  </style>
</head>
<body>
  <h2>LinkedIn Request Filter</h2>
  <label>Keywords in bio</label>
  <input id="keywords" value="founder, co-founder, VC, investor, IIT, Stanford, SRCC, Mesa, YC, Google, Anthropic" />
  <label>Minimum mutuals</label>
  <input id="minMutual" type="number" value="50" />
  <button id="acceptBtn">Accept Matching Requests</button>
  <button id="ignoreBtn">Ignore All Remaining</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
